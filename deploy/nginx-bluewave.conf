# Nginx config for bluewave.zebra-onlinedesign.com
# Copy to /etc/nginx/sites-available/bluewave on your server
# Then: sudo ln -s /etc/nginx/sites-available/bluewave /etc/nginx/sites-enabled/
#       sudo nginx -t && sudo systemctl reload nginx
#       sudo certbot --nginx -d bluewave.zebra-onlinedesign.com

server {
    listen 80;
    server_name bluewave.zebra-onlinedesign.com;

    location / {
        proxy_pass http://127.0.0.1:4001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
